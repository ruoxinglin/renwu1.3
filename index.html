<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="任务接力">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FFF7D9">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<!-- Favicon 抹茶绿与芝士黄的搭配 -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%238E990F'/><path d='M28 50l15 15 30-30' stroke='%23FFF7D9' stroke-width='8' fill='none' stroke-linecap='square' stroke-linejoin='miter'/></svg>">
<link rel="manifest" href="manifest.webmanifest">
<title>任务管理</title>
<style>
/* Matcha & Berry Retro Theme */
:root {
    --primary: #8E990F; /* 抹茶绿 */
    --primary-deep: #77800c; 
    --primary-soft: #A2AD24;
    
    --ink: #333330; 
    --ink-secondary: #4a4a45;
    --ink-mute: #7a7a72;
    --ink-mute-2: #9e9e94;
    --ink-faint: #b8b8ae;
    --on-primary: #FFF7D9; 
    --on-dark: #FFF7D9;
    
    --canvas: #FFF7D9; /* 芝士黄 */
    --canvas-soft: #f2e9c4; 
    --canvas-night: #2b2b28;
    
    --hairline: #e3d9b1;
    --hairline-strong: #c4ba91;
    --hairline-cool: #ebe1ba;
    
    --accent-yellow: #d97706; 
    --danger: #CF0802; /* 莓果红 */

    /* 分类专属主题色 */
    --cat-zhengshi: #CF0802; /* 莓果红 - 正事 */
    --cat-shenghuo: #8E990F; /* 抹茶绿 - 生活 */
    --cat-zashi: #D28C0E;    /* 复古橘 - 杂事 */
    
    --radius-xs: 4px;
    --radius-sm: 6px;  
    --radius-md: 8px;
    --radius-lg: 12px; 
    --radius-xl: 16px; 
    --radius-full: 9999px;

    --shadow-level-1: 0 1px 3px rgba(142, 153, 15, 0.08);
    --shadow-level-2: 0 8px 24px rgba(142, 153, 15, 0.12);
    --shadow-level-3: 0 16px 48px rgba(142, 153, 15, 0.15);
    
    --transition: 0.15s ease-out;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Inter', "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: var(--canvas);
    color: var(--ink);
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    -webkit-font-smoothing: antialiased;
}

a { color: var(--ink); text-decoration: underline; text-decoration-color: var(--hairline-strong); }
a:hover { text-decoration-color: var(--ink); }
button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }

/* ---------------- Sidebar ---------------- */
.sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--canvas-soft);
    border-right: 1px solid var(--hairline);
    display: flex;
    flex-direction: column;
    padding: 24px 16px;
    gap: 4px;
    user-select: none;
    overflow-y: auto;
}

.sidebar-title {
    font-size: 18px; 
    font-weight: 500;
    padding: 8px 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    letter-spacing: 0;
}
.sidebar-title svg { width: 22px; height: 22px; color: var(--primary); }

.nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    color: var(--ink-mute);
    transition: var(--transition);
    position: relative;
    font-weight: 400;
}
.nav-item:hover { background: var(--hairline-cool); color: var(--ink); }
.nav-item.active { background: var(--hairline); color: var(--ink); font-weight: 500; }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.8; }

.nav-badge {
    position: absolute;
    right: 12px;
    background: var(--hairline-cool);
    color: var(--ink-mute);
    font-size: 12px;
    padding: 2px 8px;
    border-radius: var(--radius-full);
    font-weight: 500;
    min-width: 24px;
    text-align: center;
    border: 1px solid var(--hairline);
}
.nav-item.active .nav-badge { background: var(--canvas); border-color: var(--hairline-strong); color: var(--ink); }

.sidebar-divider { height: 1px; background: var(--hairline); margin: 16px 12px; }

.list-section { display: flex; flex-direction: column; gap: 2px; max-height: 40vh; overflow-y: auto; }
.list-item .list-actions { display: none; position: absolute; right: 8px; gap: 4px; }
.list-item:hover .list-actions { display: flex; }
.list-item:hover .nav-badge { display: none; }
.list-mini-btn { padding: 4px; border-radius: var(--radius-xs); font-size: 12px; color: var(--ink-mute); }
.list-mini-btn:hover { background: var(--hairline-strong); color: var(--ink); }

/* ---------------- Main Area ---------------- */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--canvas); }

.header { padding: 48px 48px 16px; display: flex; align-items: flex-end; justify-content: space-between; }
.header h1 { font-size: 36px; font-weight: 500; letter-spacing: -0.72px; line-height: 1.15; }
.header-date { font-size: 14px; color: var(--ink-mute); margin-bottom: 6px; }

.input-area { padding: 16px 48px 32px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
.input-row {
    display: flex; gap: 10px; align-items: center; flex: 1; min-width: 0;
    background: var(--canvas);
    border: 1px solid var(--hairline-strong);
    border-radius: var(--radius-sm);
    padding: 4px 6px;
    transition: var(--transition);
}
.input-row:focus-within { border-color: var(--primary); }

.task-input { flex: 1; border: none; outline: none; padding: 10px 12px; font-size: 16px; background: transparent; min-width: 120px; color: var(--ink); }
.task-input::placeholder { color: var(--ink-faint); font-weight: 400; }

.cat-btns { display: flex; gap: 6px; padding-right: 6px; flex-shrink: 0; }
.cat-btn { 
    padding: 4px 12px; 
    border-radius: var(--radius-full); 
    font-size: 12px; 
    font-weight: 400; 
    border: 1px solid var(--hairline); 
    background: var(--canvas-soft);
    color: var(--ink-mute);
    transition: var(--transition);
    white-space: nowrap;
    flex-shrink: 0;
}
/* 增强分类按钮激活时的色彩区分 */
.cat-btn.zhengshi.active { background: var(--cat-zhengshi); color: var(--on-dark); border-color: var(--cat-zhengshi); font-weight: 500; }
.cat-btn.zashi.active { background: var(--cat-zashi); color: var(--on-dark); border-color: var(--cat-zashi); font-weight: 500; }
.cat-btn.shenghuo.active { background: var(--cat-shenghuo); color: var(--on-primary); border-color: var(--cat-shenghuo); font-weight: 500; }

.add-btn {
    padding: 10px 20px; 
    background: var(--primary); 
    color: var(--on-primary); 
    border-radius: var(--radius-sm); 
    font-weight: 500; 
    font-size: 14px; 
    transition: var(--transition); 
    white-space: nowrap;
    border: 1px solid transparent;
}
.add-btn:hover { background: var(--primary-deep); }
.add-btn:active { transform: translateY(1px); }

/* ---------------- Content & Cards ---------------- */
.content { flex: 1; overflow-y: auto; padding: 8px 48px 64px; display: flex; flex-direction: column; gap: 12px; }

.task-card {
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    transition: var(--transition);
    cursor: pointer;
    animation: fadeIn .2s ease-out;
    position: relative;
    z-index: 2;
}
/* 左侧色彩提示带，增强“一眼识别”能力 */
.task-card.cat-zhengshi { border-left: 4px solid var(--cat-zhengshi); }
.task-card.cat-zashi { border-left: 4px solid var(--cat-zashi); }
.task-card.cat-shenghuo { border-left: 4px solid var(--cat-shenghuo); }

.task-card:hover { border-color: var(--hairline-strong); box-shadow: var(--shadow-level-1); }
.task-card.completed { opacity: 0.55; background: var(--canvas-soft); border-left-color: var(--hairline-strong) !important; }
.task-card.completed .task-name { text-decoration: line-through; color: var(--ink-mute); }
.task-card.completed .card-cat-tag { filter: grayscale(1); opacity: 0.7; }

/* 增强分类文字标签，填入对应的背景色 */
.card-cat-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: var(--radius-full);
    font-size: 12px;
    font-weight: 500;
    margin-right: 8px;
    vertical-align: middle;
    border: 1px solid transparent;
}
.tag-zhengshi { background: rgba(207, 8, 2, 0.1); color: var(--cat-zhengshi); border-color: rgba(207, 8, 2, 0.2); }
.tag-zashi { background: rgba(210, 140, 14, 0.1); color: var(--cat-zashi); border-color: rgba(210, 140, 14, 0.2); }
.tag-shenghuo { background: rgba(142, 153, 15, 0.15); color: var(--primary-deep); border-color: rgba(142, 153, 15, 0.25); }


@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.checkbox {
    width: 18px; height: 18px; 
    border-radius: 4px; 
    border: 1.5px solid var(--hairline-strong);
    display: flex; align-items: center; justify-content: center; 
    flex-shrink: 0; margin-top: 2px; transition: var(--transition);
    background: var(--canvas);
}
.task-card:hover .checkbox { border-color: var(--ink-mute); }
.task-card.completed .checkbox { background: var(--primary); border-color: var(--primary); }
.checkbox svg { width: 12px; height: 12px; color: var(--on-primary); opacity: 0; transition: var(--transition); stroke-width: 3px; }
.task-card.completed .checkbox svg { opacity: 1; }

.task-body { flex: 1; min-width: 0; }
.task-time { font-size: 13px; font-weight: 500; color: var(--ink-mute); margin-right: 8px; }
.task-name { font-size: 16px; font-weight: 400; color: var(--ink); word-break: break-word; line-height: 1.5; }
.task-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }

.task-swipe-wrap { position: relative; border-radius: var(--radius-lg); z-index: 1; background: var(--canvas-soft); border: 1px solid transparent;}
.swipe-bg {
    position: absolute; inset: 0; background: var(--primary); color: var(--on-primary); 
    display: flex; align-items: center; padding-left: 24px; border-radius: var(--radius-lg); opacity: 0; z-index: 1; transition: opacity 0.2s;
}

.task-notes-wrapper { width: 100%; margin-top: 8px; }
.task-notes {
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    font-size: 14px; color: var(--ink-mute); line-height: 1.5; word-break: break-word; font-family: inherit;
    padding-left: 12px; border-left: 2px solid var(--hairline);
}
.task-notes.expanded { -webkit-line-clamp: unset; }
.notes-toggle-btn { font-size: 12px; color: var(--ink-mute-2); cursor: pointer; display: inline-block; margin-top: 6px; user-select: none; }
.notes-toggle-btn:hover { color: var(--ink); text-decoration: underline; text-decoration-color: var(--hairline-strong); }

.task-actions { display: flex; gap: 4px; flex-shrink: 0; align-items: center; opacity: 0.2; transition: var(--transition); }
.task-card:hover .task-actions { opacity: 1; }
.icon-btn { padding: 6px; border-radius: var(--radius-xs); transition: var(--transition); display: flex; color: var(--ink-mute); }
.icon-btn:hover { background: var(--hairline-cool); color: var(--ink); }
.icon-btn.myday-active { color: var(--accent-yellow); opacity: 1; }
.icon-btn.danger:hover { background: var(--canvas); color: var(--danger); border: 1px solid var(--danger); padding: 5px; }
.icon-btn svg { width: 16px; height: 16px; }

/* Empty states */
.empty-state { text-align: center; padding: 100px 20px; color: var(--ink-mute); }
.empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; stroke-width: 1px; }
.empty-state p { font-size: 16px; }

/* Toolbar */
.archive-toolbar { display: flex; align-items: center; gap: 16px; padding: 16px 48px 32px; flex-wrap: wrap; justify-content: space-between; }
.archive-filters { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.filter-label { font-size: 13px; color: var(--ink-mute); font-weight: 500; }
.filter-chip { 
    padding: 4px 12px; border-radius: var(--radius-full); font-size: 12px; font-weight: 400; 
    border: 1px solid var(--hairline); background: var(--canvas); color: var(--ink-mute); transition: var(--transition); 
}
.filter-chip.active { background: var(--primary); border-color: var(--primary); color: var(--on-primary); font-weight: 500; }

.export-btn { 
    padding: 8px 16px; background: var(--canvas); border: 1px solid var(--hairline-strong); 
    border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; color: var(--ink); 
    transition: var(--transition); display: flex; align-items: center; gap: 8px; 
}
.export-btn:hover { background: var(--canvas-soft); border-color: var(--primary); }

/* Timeline */
.timeline { padding: 0 48px 64px; display: flex; flex-direction: column; gap: 32px; }
.timeline-day { animation: fadeIn .2s ease; }
.timeline-header { 
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px; position: sticky; top: 0; 
    background: rgba(255, 247, 217, 0.9); backdrop-filter: blur(4px); padding: 12px 0; z-index: 10; user-select: none; 
    border-bottom: 1px solid var(--hairline);
}
.timeline-date { font-size: 18px; font-weight: 500; letter-spacing: 0; }
.timeline-count { font-size: 12px; color: var(--ink-mute); background: var(--hairline-cool); padding: 2px 8px; border-radius: var(--radius-full); }
.timeline-tasks { display: flex; flex-direction: column; gap: 12px; }
.archive-arrow { width: 16px; height: 16px; transition: var(--transition); color: var(--ink-mute); margin-right: 4px; }
.archive-arrow.open { transform: rotate(90deg); color: var(--ink); }

/* Modals */
.toast-container { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 24px; border-radius: var(--radius-sm); background: var(--ink); color: var(--canvas); font-size: 14px; font-weight: 400; box-shadow: var(--shadow-level-2); animation: toastIn .2s ease, toastOut .2s ease 2s forwards; border: 1px solid var(--ink-secondary); }
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-8px)}}

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(2px); z-index: 999; display: flex; align-items: center; justify-content: center; animation: fadeIn .15s ease; }
.modal-overlay.hidden { display: none; }
.modal-box { 
    background: var(--canvas); border-radius: var(--radius-xl); padding: 32px; width: 90%; max-width: 480px; 
    box-shadow: var(--shadow-level-3); border: 1px solid var(--hairline-strong); 
}
.modal-box h2 { font-size: 28px; font-weight: 500; letter-spacing: -0.42px; margin-bottom: 24px; line-height: 1.2; }
.modal-box label { display: block; font-size: 13px; color: var(--ink-mute); margin-bottom: 6px; margin-top: 20px; font-weight: 500; }
.text-input, .modal-box input, .modal-box textarea { 
    width: 100%; padding: 10px 12px; border: 1px solid var(--hairline-strong); border-radius: var(--radius-sm); 
    font-size: 16px; font-family: inherit; outline: none; transition: var(--transition); background: var(--canvas); color: var(--ink); box-sizing: border-box; 
}
.modal-box input:focus, .modal-box textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }
.modal-box textarea { min-height: 100px; resize: vertical; font-family: 'Inter', monospace; font-size: 14px; }
.modal-cats { display: flex; gap: 8px; margin-top: 8px; }
.modal-cat-btn { 
    padding: 6px 16px; border-radius: var(--radius-full); border: 1px solid var(--hairline); 
    font-size: 13px; font-weight: 400; transition: var(--transition); background: var(--canvas-soft); cursor: pointer; color: var(--ink-mute);
}
.modal-cat-btn.sel.zhengshi { background: var(--cat-zhengshi); color: var(--on-dark); border-color: var(--cat-zhengshi); font-weight: 500; }
.modal-cat-btn.sel.zashi { background: var(--cat-zashi); color: var(--on-dark); border-color: var(--cat-zashi); font-weight: 500; }
.modal-cat-btn.sel.shenghuo { background: var(--cat-shenghuo); color: var(--on-primary); border-color: var(--cat-shenghuo); font-weight: 500; }

.modal-actions { display: flex; gap: 12px; margin-top: 32px; justify-content: flex-end; }
.modal-save { padding: 10px 24px; background: var(--primary); color: var(--on-primary); border-radius: var(--radius-sm); font-weight: 500; font-size: 14px; transition: var(--transition); border: 1px solid transparent;}
.modal-save:hover { background: var(--primary-deep); }
.modal-cancel { padding: 10px 24px; background: var(--canvas); color: var(--ink); border: 1px solid var(--hairline-strong); border-radius: var(--radius-sm); font-weight: 500; font-size: 14px; transition: var(--transition); }
.modal-cancel:hover { background: var(--canvas-soft); border-color: var(--ink); }

/* Changelog Styles */
.changelog-card { background: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--radius-lg); padding: 32px; margin-bottom: 24px; box-shadow: var(--shadow-level-1); }
.changelog-title { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; font-size: 20px; font-weight: 500; color: #3b82f6; letter-spacing: 0; }
.changelog-date { font-size: 12px; color: var(--ink-mute); font-weight: 400; background: var(--canvas-soft); padding: 4px 10px; border-radius: var(--radius-full); border: 1px solid var(--hairline); }
.changelog-list { padding-left: 20px; color: var(--ink-secondary); font-size: 14px; line-height: 1.8; }
.changelog-list li { margin-bottom: 8px; }

/* Responsive Mobile overrides */
@media(max-width: 768px) {
    body { flex-direction: column; }
    .sidebar { width: 100%; min-width: 0; flex-direction: row; padding: 12px 16px; gap: 8px; overflow-x: auto; border-right: none; border-bottom: 1px solid var(--hairline); }
    .sidebar-title, .sidebar-divider, .list-section, .add-list-btn { display: none; }
    .nav-item { padding: 8px 16px; font-size: 13px; white-space: nowrap; border: 1px solid var(--hairline); background: var(--canvas); }
    .nav-item.active { background: var(--ink); color: var(--canvas); border-color: var(--ink); }
    .nav-badge { position: static; margin-left: 6px; padding: 2px 6px; font-size: 10px; background: var(--canvas-soft); border:none; }
    .nav-item.active .nav-badge { background: rgba(255,255,255,0.2); color: var(--canvas); }
    
    .header { padding: 32px 20px 16px; }
    .header h1 { font-size: 28px; letter-spacing: -0.42px; }
    .input-area, .archive-toolbar, .content, .timeline { padding-left: 20px; padding-right: 20px; }
    .input-area { flex-direction: column; gap: 12px; padding-top: 0; }
    .input-row { width: 100%; flex-wrap: wrap; gap: 8px; padding: 8px; }
    .task-input { font-size: 16px; }
    .add-btn { width: 100%; padding: 12px; text-align: center; }
    .archive-toolbar { padding: 16px 20px; gap: 12px; }
    .export-btn { margin-left: auto; font-size: 12px; padding: 6px 12px; }
    .task-card { padding: 16px; gap: 12px; }
    .modal-box { padding: 24px; width: 95%; }
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--hairline-strong); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-mute); }

</style>
</head>
<body>

<nav class="sidebar">
    <div class="sidebar-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 3v18"/></svg>
        任务管理
    </div>
    <button class="nav-item active" data-view="all">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        所有任务
        <span class="nav-badge" id="badge-all">0</span>
    </button>
    <button class="nav-item" data-view="myday">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        我的一天
        <span class="nav-badge" id="badge-myday">0</span>
    </button>
    <button class="nav-item" data-view="weathered">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>
        风化
        <span class="nav-badge" id="badge-weathered">0</span>
    </button>
    <div class="sidebar-divider"></div>
    <div class="list-section" id="list-section"></div>
    <button class="nav-item add-list-btn" id="add-list-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新建清单
    </button>
    <div class="sidebar-divider"></div>
    <button class="nav-item" data-view="archive">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        归档
    </button>
    
    <div class="sidebar-divider"></div>

<script>
(function(){
const APP_VERSION = 'offline-dual-handoff-v1.3-2026-06-04';
const STORAGE_PREFIX = 'todo_offline_dual_handoff_v1_';
const STORAGE_KEY = STORAGE_PREFIX + 'tasks';
const LISTS_KEY = STORAGE_PREFIX + 'lists';
const MYDAY_DATE_KEY = STORAGE_PREFIX + 'myday_date';
const TOMBSTONES_KEY = STORAGE_PREFIX + 'sync_tombstones';
const SYNC_URL_KEY = STORAGE_PREFIX + 'sync_url';
const SYNC_USER_KEY = STORAGE_PREFIX + 'sync_user';
const SYNC_PASS_KEY = STORAGE_PREFIX + 'sync_pass';
const SYNC_PROXY_KEY = STORAGE_PREFIX + 'sync_proxy_url';
const SYNC_ENABLED_KEY = STORAGE_PREFIX + 'sync_enabled';

const CAT_LABELS = { 'zhengshi': '正事', 'zashi': '杂事', 'shenghuo': '生活' };

function loadTasks(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]}catch(e){return[]}}
function saveTasks(tasks){localStorage.setItem(STORAGE_KEY,JSON.stringify(tasks))}
function loadLists(){try{return JSON.parse(localStorage.getItem(LISTS_KEY))||[]}catch(e){return[]}}
function saveLists(lists){localStorage.setItem(LISTS_KEY,JSON.stringify(lists))}
function loadTombstones(){try{return JSON.parse(localStorage.getItem(TOMBSTONES_KEY))||{tasks:{},lists:{}}}catch(e){return{tasks:{},lists:{}}}}
function saveTombstones(t){localStorage.setItem(TOMBSTONES_KEY,JSON.stringify(t||{tasks:{},lists:{}}))}
function genId(){return Date.now().toString(36)+Math.random().toString(36).substr(2,6)}
function getDefaultProxyUrl(){return window.location.origin;}
function downloadBlob(blob,filename){
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download=filename;
    a.click();URL.revokeObjectURL(url);
}
function deliverHandoffFile(data,filename){
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    if(window.showSaveFilePicker){
        return window.showSaveFilePicker({
            suggestedName:filename,
            types:[{description:'任务接力 JSON',accept:{'application/json':['.json']}}]
        }).then(function(handle){
            return handle.createWritable().then(function(writable){
                return writable.write(blob).then(function(){return writable.close();});
            });
        }).then(function(){return 'saved';}).catch(function(err){
            if(err&&err.name==='AbortError')return 'cancelled';
            downloadBlob(blob,filename);
            return 'downloaded';
        });
    }
    try{
        var file=new File([blob],filename,{type:'application/json'});
        if(navigator.canShare&&navigator.canShare({files:[file]})&&navigator.share){
            return navigator.share({files:[file],title:'任务接力文件'}).then(function(){return 'shared';}).catch(function(err){
                if(err&&err.name==='AbortError')return 'cancelled';
                downloadBlob(blob,filename);
                return 'downloaded';
            });
        }
    }catch(e){}
    downloadBlob(blob,filename);
    return Promise.resolve('downloaded');
}
function normalizeSyncUrl(url){
    url=(url||'').trim().replace(/ /g,'');
    if(url.match(/\/dav\/?$/)||(url.endsWith('/')&&!url.endsWith('.json'))){
        url=url.replace(/\/+$/,'')+'/todo/data.json';
    }
    return url;
}
function itemTime(item){return Number(item&&item.updatedAt)||Number(item&&item.createdAt)||0}
function normalizeItems(items){
    const now=Date.now();
    return (items||[]).filter(function(item){return item&&item.id;}).map(function(item){
        if(!item.createdAt)item.createdAt=now;
        if(!item.updatedAt)item.updatedAt=item.createdAt;
        if(!item.activeAt)item.activeAt=item.createdAt;
        return item;
    });
}
function pruneTombstones(tombstones,tasks,lists){
    var taskIds={}, listIds={};
    tasks.forEach(function(t){taskIds[t.id]=true;});
    lists.forEach(function(l){listIds[l.id]=true;});
    Object.keys(tombstones.tasks||{}).forEach(function(id){if(taskIds[id])delete tombstones.tasks[id];});
    Object.keys(tombstones.lists||{}).forEach(function(id){if(listIds[id])delete tombstones.lists[id];});
    saveTombstones(tombstones);
}
function mergeItemArrays(localItems,remoteItems,deletedMap){
    var byId={};
    normalizeItems(localItems).concat(normalizeItems(remoteItems)).forEach(function(item){
        var deletedAt=Number(deletedMap&&deletedMap[item.id])||0;
        if(deletedAt>=itemTime(item))return;
        if(!byId[item.id]||itemTime(item)>itemTime(byId[item.id]))byId[item.id]=item;
    });
    return Object.keys(byId).map(function(id){return byId[id];}).sort(function(a,b){return itemTime(b)-itemTime(a);});
}
function parseInput(raw){
    const idx=raw.indexOf('#');
    if(idx===-1)return{name:raw.trim(),notes:''};
    return{name:raw.substring(0,idx).trim(),notes:raw.substring(idx+1).trim()};
}
function renderNotes(notes){
    if(!notes)return'';
    const urlRe=/(https?:\/\/[^\s<>"'\u3002\uFF0C\uFF0C\u3001]+)/gi;
    let html=notes.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html=html.replace(urlRe,function(url){return '<a href="'+url+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">'+url+'</a>';});
    html=html.replace(/【进度 (.*?)】/g, '<strong style="color:var(--ink); font-weight: 500;">【进度 $1】</strong>');
    return html;
}
function formatDate(ts){
    const d=new Date(ts);const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const day=String(d.getDate()).padStart(2,'0');
    const week=['日','一','二','三','四','五','六'][d.getDay()];
    const now=new Date();const today=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
    const target=new Date(y,d.getMonth(),d.getDate()).getTime();
    if(target===today)return'今天 '+m+'-'+day;
    const yesterday=today-86400000;
    if(target===yesterday)return'昨天 '+m+'-'+day;
    return y+'-'+m+'-'+day+' 周'+week;
}
function formatDateTime(ts){
    const d=new Date(ts);const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const day=String(d.getDate()).padStart(2,'0');
    const h=String(d.getHours()).padStart(2,'0');const min=String(d.getMinutes()).padStart(2,'0');
    const week=['日','一','二','三','四','五','六'][d.getDay()];
    const now=new Date();const today=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
    const target=new Date(y,d.getMonth(),d.getDate()).getTime();
    if(target===today)return'今天 '+h+':'+min;
    const yesterday=today-86400000;
    if(target===yesterday)return'昨天 '+h+':'+min;
    return y+'-'+m+'-'+day+' '+h+':'+min+' 周'+week;
}

const App={
    tasks:[],
    lists:[],
    currentList:'all',
    view:'all',
    archiveFilters:{zhengshi:true,zashi:true,shenghuo:true},

    init:function(){
        var self=this;
        this.tasks=normalizeItems(loadTasks());
        this.lists=normalizeItems(loadLists());
        saveTasks(this.tasks);
        saveLists(this.lists);
        this._webdavEnabled=localStorage.getItem(SYNC_ENABLED_KEY)==='1';
        (function(){
            var url=localStorage.getItem(SYNC_URL_KEY);
            if(!url)return;
            localStorage.setItem(SYNC_URL_KEY,normalizeSyncUrl(url));
        })();
        if(this.lists.length===0){
            this.lists=[{id:genId(),name:'默认清单',createdAt:Date.now(),updatedAt:Date.now()}];
            saveLists(this.lists);
        }
        this.checkMyDayReset();
        this.renderSidebar();
        this.bindNav();
        this.bindGlobalClicks();
        this.bindSwipeEvents();
        this.render();
        this.setMidnightTimer();
        document.getElementById('btn-export').addEventListener('click',function(){self.exportAll();});
        document.getElementById('btn-import').addEventListener('click',function(){document.getElementById('import-file').click();});
        document.getElementById('import-file').addEventListener('change',function(e){if(e.target.files[0])self.importAll(e.target.files[0]);e.target.value='';});
        document.getElementById('btn-sync').addEventListener('click',function(){self.openSyncSettings();});
        
        document.getElementById('btn-upload-sync').addEventListener('click',function(){
            var cfg=self._getWebDAVConfig();
            if(!cfg.enabled||!cfg.url){self.toast('请先配置同步设置');return;}
            self.toast('正在上传本机接力数据...');
            self._syncToWebDAV().then(function(){
                self.toast('已上传，换设备后点「接收同步」');
            }).catch(function(err){
                self.toast('上传失败: '+err.message);
            });
        });
        document.getElementById('btn-force-sync').addEventListener('click',function(){
            var cfg=self._getWebDAVConfig();
            if(!cfg.enabled||!cfg.url){self.toast('请先配置同步设置');return;}
            self.toast('正在接收云端数据...');
            self._syncFromWebDAV().then(function(remote){
                if(remote){
                    self.render();
                    self.toast('已接收并合并到本机');
                }
            }).catch(function(err){
                self.toast('接收失败: '+err.message);
            });
        });
        self._webdavEnabled=localStorage.getItem(SYNC_ENABLED_KEY)==='1';
        if(self._webdavEnabled){
            document.getElementById('btn-upload-sync').style.display='flex';
            document.getElementById('btn-force-sync').style.display='flex';
        }
    },

    checkMyDayReset:function(){
        const today=new Date().toDateString();
        const stored=localStorage.getItem(MYDAY_DATE_KEY);
        if(stored!==today){
            const now=Date.now();
            this.tasks.forEach(function(t){if(t.inMyDay){t.inMyDay=false;t.updatedAt=now;}});
            saveTasks(this.tasks);
            localStorage.setItem(MYDAY_DATE_KEY,today);
        }else if(!stored){
            localStorage.setItem(MYDAY_DATE_KEY,today);
        }
    },

    setMidnightTimer:function(){
        const self=this;
        const now=new Date();
        const midnight=new Date(now);midnight.setHours(24,0,0,0);
        const ms=midnight-now;
        setTimeout(function(){
            const nowTs=Date.now();
            self.tasks.forEach(function(t){if(t.inMyDay){t.inMyDay=false;t.updatedAt=nowTs;}});
            saveTasks(self.tasks);
            localStorage.setItem(MYDAY_DATE_KEY,new Date().toDateString());
            self.render();
            self.setMidnightTimer();
        },ms+1000);
    },

    addList:function(name){
        if(!name.trim())return;
        const now=Date.now();
        const list={id:genId(),name:name.trim(),createdAt:now,updatedAt:now};
        this.lists.push(list);
        saveLists(this.lists);
        this.renderSidebar();
        this.render();
        this.toast('清单已创建');this._autoSync();
    },

    renameList:function(id,newName){
        if(!newName.trim())return;
        const list=this.lists.find(function(l){return l.id===id;});
        if(!list)return;
        list.name=newName.trim();
        list.updatedAt=Date.now();
        saveLists(this.lists);
        this.renderSidebar();
        this.render();
        this._autoSync();
    },

    deleteList:function(id){
        const list=this.lists.find(function(l){return l.id===id;});
        if(!list)return;
        if(!confirm('确定要删除清单\u300c'+list.name+'\u300d吗？该清单中的任务将一并删除。'))return;
        var tombstones=loadTombstones();
        var now=Date.now();
        this.tasks.forEach(function(t){if(t.listId===id)tombstones.tasks[t.id]=now;});
        tombstones.lists[id]=now;
        saveTombstones(tombstones);
        this.tasks=this.tasks.filter(function(t){return t.listId!==id;});
        this.lists=this.lists.filter(function(l){return l.id!==id;});
        saveTasks(this.tasks);
        saveLists(this.lists);
        if(this.currentList===id)this.currentList='all';
        this.renderSidebar();
        this.render();
        this.toast('清单已删除');this._autoSync();
    },

    renderSidebar:function(){
        var self=this;
        var section=document.getElementById('list-section');
        if(!section)return;
        section.innerHTML='';
        this.lists.forEach(function(list){
            var item=document.createElement('button');
            item.className='nav-item list-item'+(self.currentList===list.id&&self.view==='all'?' active':'');
            item.dataset.list=list.id;
            var now = Date.now();
            var count=self.tasks.filter(function(t){
                return t.listId===list.id && !t.completed && (t.inMyDay || (now - (t.activeAt || t.createdAt)) <= 5 * 24 * 60 * 60 * 1000);
            }).length;
            item.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>'+
                list.name+'<span class="nav-badge">'+count+'</span>'+
                '<span class="list-actions">'+
                '<button class="list-mini-btn" data-action="rename" title="重命名">\u270f</button>'+
                '<button class="list-mini-btn" data-action="delete" title="删除">\u2716</button>'+
                '</span>';
            item.addEventListener('click',function(e){
                if(e.target.closest('.list-mini-btn'))return;
                self.currentList=list.id;
                self.view='all';
                self.render();
            });
            item.querySelector('[data-action="rename"]').addEventListener('click',function(e){
                e.stopPropagation();
                var n=prompt('重命名清单：',list.name);
                if(n)self.renameList(list.id,n);
            });
            item.querySelector('[data-action="delete"]').addEventListener('click',function(e){
                e.stopPropagation();
                self.deleteList(list.id);
            });
            section.appendChild(item);
        });
        
        var allBtn=document.querySelector('.nav-item[data-view="all"]');
        var mydayBtn=document.querySelector('.nav-item[data-view="myday"]');
        var weatheredBtn=document.querySelector('.nav-item[data-view="weathered"]');
        var archiveBtn=document.querySelector('.nav-item[data-view="archive"]');
        var changelogBtn=document.querySelector('.nav-item[data-view="changelog"]');
        
        if(allBtn)allBtn.classList.toggle('active',self.currentList==='all'&&self.view==='all');
        if(mydayBtn)mydayBtn.classList.toggle('active',self.view==='myday');
        if(weatheredBtn)weatheredBtn.classList.toggle('active',self.view==='weathered');
        if(archiveBtn)archiveBtn.classList.toggle('active',self.view==='archive');
        if(changelogBtn)changelogBtn.classList.toggle('active',self.view==='changelog');
    },

    bindNav:function(){
        var self=this;
        document.querySelectorAll('.nav-item[data-view]').forEach(function(el){
            el.addEventListener('click',function(){
                self.view=el.dataset.view;
                if(el.dataset.view==='all')self.currentList='all';
                self.render();
            });
        });
        document.getElementById('add-list-btn').addEventListener('click',function(){
            var name=prompt('新建清单名称：');
            if(name)self.addList(name);
        });
    },

    bindGlobalClicks:function(){
        var self=this;
        var clickTimer=null;
        document.getElementById('view-content').addEventListener('click',function(e){
            if(self.isSwiping)return; 
            const card=e.target.closest('.task-card');
            if(!card)return;
            if(e.target.closest('.checkbox')||e.target.closest('.icon-btn')||e.target.closest('a')||e.target.closest('.notes-toggle-btn'))return;
            if(clickTimer){clearTimeout(clickTimer);clickTimer=null;return;}
            clickTimer=setTimeout(function(){clickTimer=null;self.openDetail(card.dataset.id);},300);
        });
        document.getElementById('view-content').addEventListener('dblclick',function(e){
            if(self.isSwiping)return;
            const card=e.target.closest('.task-card');
            if(!card)return;
            if(e.target.closest('.checkbox')||e.target.closest('.icon-btn')||e.target.closest('a')||e.target.closest('.notes-toggle-btn'))return;
            if(clickTimer){clearTimeout(clickTimer);clickTimer=null;}
            self.toggleMyDay(card.dataset.id);
        });
    },

    bindSwipeEvents:function(){
        var self = this;
        var content = document.getElementById('view-content');
        if(!content) return;
        
        var startX = 0, startY = 0, isDragging = false;
        var targetCard = null, swipeWrap = null, swipeBg = null;
        
        var startDrag = function(e) {
            var card = e.target.closest('.task-card');
            if (!card) return;
            if(e.target.closest('.checkbox')||e.target.closest('.icon-btn')||e.target.closest('a')||e.target.closest('.notes-toggle-btn')) return;
            
            var clientX = e.touches ? e.touches[0].clientX : e.clientX;
            var clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            startX = clientX; startY = clientY;
            targetCard = card;
            swipeWrap = targetCard.parentElement;
            if(!swipeWrap || !swipeWrap.classList.contains('task-swipe-wrap')) {
                swipeWrap = null; targetCard = null; return;
            }
            swipeBg = swipeWrap.querySelector('.swipe-bg');
            isDragging = true;
            targetCard.style.transition = 'none';
        };
        
        var doDrag = function(e) {
            if (!isDragging || !targetCard) return;
            var clientX = e.touches ? e.touches[0].clientX : e.clientX;
            var clientY = e.touches ? e.touches[0].clientY : e.clientY;
            var deltaX = clientX - startX;
            var deltaY = clientY - startY;
            
            if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > 10) {
                cancelDrag(); return;
            }
            if (deltaX > 10) self.isSwiping = true;
            if (deltaX > 0) {
                targetCard.style.transform = 'translateX(' + Math.min(deltaX, 100) + 'px)';
                if(swipeBg) swipeBg.style.opacity = Math.min(deltaX / 70, 1);
            }
        };
        
        var stopDrag = function(e) {
            if (!isDragging || !targetCard) return;
            isDragging = false;
            var deltaX = targetCard.style.transform ? parseFloat(targetCard.style.transform.replace('translateX(', '')) : 0;
            targetCard.style.transition = 'transform 0.2s ease-out';
            targetCard.style.transform = '';
            if(swipeBg) swipeBg.style.opacity = '0';
            
            if (deltaX > 65) {
                var taskId = targetCard.dataset.id;
                setTimeout(function() { self.openProgressModal(taskId); }, 10);
            }
            targetCard = null;
            setTimeout(function() { self.isSwiping = false; }, 100);
        };
        
        var cancelDrag = function() {
            if (!isDragging || !targetCard) return;
            isDragging = false;
            targetCard.style.transition = 'transform 0.2s ease-out';
            targetCard.style.transform = '';
            if(swipeBg) swipeBg.style.opacity = '0';
            targetCard = null;
            setTimeout(function() { self.isSwiping = false; }, 100);
        };
        
        content.addEventListener('touchstart', startDrag, {passive: true});
        content.addEventListener('touchmove', doDrag, {passive: true});
        content.addEventListener('touchend', stopDrag);
        content.addEventListener('touchcancel', cancelDrag);
        
        content.addEventListener('mousedown', startDrag);
        content.addEventListener('mousemove', doDrag);
        content.addEventListener('mouseup', stopDrag);
        content.addEventListener('mouseleave', cancelDrag);
    },

    openProgressModal:function(id){
        var self = this;
        var task = this.tasks.find(function(t) { return t.id === id; });
        if (!task) return;
        
        var modal = document.getElementById('progress-modal');
        var input = document.getElementById('modal-progress-input');
        input.value = '';
        modal.classList.remove('hidden');
        setTimeout(function(){ input.focus(); }, 100);
        
        var saveHandler = function() {
            var val = input.value.trim();
            if (val) {
                var d = new Date();
                var timeStr = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
                
                var existingNotes = task.notes || '';
                var progressRegex = /^【进度 .*?】(.*?)(?:\n\n|$)/s;
                var match = existingNotes.match(progressRegex);
                
                if (match) {
                    var oldProgress = match[1].trim();
                    var restOfNotes = existingNotes.substring(match[0].length).trim();
                    
                    task.notes = '【进度 ' + timeStr + '】 ' + val + (oldProgress ? ' - ' + oldProgress : '');
                    if (restOfNotes) {
                        task.notes += '\n\n' + restOfNotes;
                    }
                } else {
                    var separator = existingNotes ? '\n\n' : '';
                    task.notes = '【进度 ' + timeStr + '】 ' + val + separator + existingNotes;
                }
                
                task.updatedAt = Date.now();
                saveTasks(self.tasks);
                self.render();
                self.toast('进度记录已更新');
                self._autoSync();
            }
            cleanup();
        };
        
        var cancelHandler = function() { cleanup(); };
        var cleanup = function() {
            modal.classList.add('hidden');
            document.getElementById('progress-save').removeEventListener('click', saveHandler);
            document.getElementById('progress-cancel').removeEventListener('click', cancelHandler);
        };
        
        document.getElementById('progress-save').addEventListener('click', saveHandler);
        document.getElementById('progress-cancel').addEventListener('click', cancelHandler);
    },

    _getWebDAVConfig:function(){
        return {
            url: localStorage.getItem(SYNC_URL_KEY)||'',
            user: localStorage.getItem(SYNC_USER_KEY)||'',
            pass: localStorage.getItem(SYNC_PASS_KEY)||'',
            proxyUrl: getDefaultProxyUrl(),
            enabled: localStorage.getItem(SYNC_ENABLED_KEY)==='1'
        };
    },

    _saveWebDAVConfig:function(url,user,pass,enabled,proxyUrl){
        localStorage.setItem(SYNC_URL_KEY,normalizeSyncUrl(url));
        localStorage.setItem(SYNC_USER_KEY,user);
        localStorage.setItem(SYNC_PASS_KEY,pass);
        localStorage.setItem(SYNC_PROXY_KEY,proxyUrl||getDefaultProxyUrl());
        localStorage.setItem(SYNC_ENABLED_KEY,enabled?'1':'0');
        this._webdavEnabled=enabled;
        document.getElementById('btn-upload-sync').style.display=enabled?'flex':'none';
        document.getElementById('btn-force-sync').style.display=enabled?'flex':'none';
    },

    _webdavFetch:function(method,body){
        var cfg=this._getWebDAVConfig();
        if(!cfg.url||!cfg.user||!cfg.pass)return Promise.reject(new Error('not configured'));
        var controller=null;
        var timer=null;
        if(window.AbortController){
            controller=new AbortController();
            timer=setTimeout(function(){controller.abort();},20000);
        }
        var opts={
            method:'POST',
            headers:{
                'X-WebDAV-Url':cfg.url,
                'X-WebDAV-Auth':'Basic '+btoa(cfg.user+':'+cfg.pass),
                'X-WebDAV-Method':method,
                'X-WebDAV-Mkcol':method==='PUT'?'1':'0'
            }
        };
        if(body){
            opts.headers['Content-Type']='application/json';
            opts.body=JSON.stringify(body);
        }
        if(controller)opts.signal=controller.signal;
        return fetch(cfg.proxyUrl,opts).finally(function(){if(timer)clearTimeout(timer);});
    },

    _makeSyncPayload:function(){
        var tombstones=loadTombstones();
        return {
            version:2,
            appVersion:APP_VERSION,
            updatedAt:Date.now(),
            tasks:normalizeItems(this.tasks),
            lists:normalizeItems(this.lists),
            syncMeta:{
                deletedTasks:tombstones.tasks||{},
                deletedLists:tombstones.lists||{}
            }
        };
    },

    _mergeRemoteData:function(data){
        var tombstones=loadTombstones();
        var remoteMeta=data.syncMeta||{};
        if((data.lists||[]).length>0&&this.lists.length===1&&this.lists[0].name==='默认清单'&&this.tasks.length===0){
            this.lists=[];
        }
        Object.keys(remoteMeta.deletedTasks||{}).forEach(function(id){
            tombstones.tasks[id]=Math.max(Number(tombstones.tasks[id])||0,Number(remoteMeta.deletedTasks[id])||0);
        });
        Object.keys(remoteMeta.deletedLists||{}).forEach(function(id){
            tombstones.lists[id]=Math.max(Number(tombstones.lists[id])||0,Number(remoteMeta.deletedLists[id])||0);
        });
        this.tasks=mergeItemArrays(this.tasks,data.tasks||[],tombstones.tasks);
        this.lists=mergeItemArrays(this.lists,data.lists||[],tombstones.lists);
        pruneTombstones(tombstones,this.tasks,this.lists);
        saveTasks(this.tasks);
        saveLists(this.lists);
        return {tasks:this.tasks,lists:this.lists};
    },

    _syncFromWebDAV:function(){
        var self=this;
        return this._webdavFetch('GET').then(function(r){
            if(!r.ok)throw new Error('HTTP '+r.status);
            return r.json();
        }).then(function(data){
            if(data&&data.tasks&&data.lists){
                return self._mergeRemoteData(data);
            }
            throw new Error('invalid data');
        });
    },

    _syncToWebDAV:function(){
        var self=this;
        return this._webdavFetch('PUT',this._makeSyncPayload()).then(function(r){
            if(!r.ok)throw new Error('HTTP '+r.status);
            return r;
        });
    },

    _autoSync:function(){
        return;
    },

    openSyncSettings:function(){
        var self=this;
        var cfg=this._getWebDAVConfig();
        document.getElementById('sync-url').value=cfg.url;
        document.getElementById('sync-user').value=cfg.user;
        document.getElementById('sync-pass').value=cfg.pass;
        document.getElementById('sync-proxy-url').value=cfg.proxyUrl||'';
        document.getElementById('sync-enable').checked=cfg.enabled;
        document.getElementById('sync-status').textContent='';
        document.getElementById('sync-modal').classList.remove('hidden');

        document.getElementById('sync-test').onclick=function(){
            var s=document.getElementById('sync-status');
            var tmpUrl=normalizeSyncUrl(document.getElementById('sync-url').value);
            document.getElementById('sync-url').value=tmpUrl;
            var tmpUser=document.getElementById('sync-user').value.trim();
            var tmpPass=document.getElementById('sync-pass').value.trim();
            var proxyUrl=document.getElementById('sync-proxy-url').value.trim()||getDefaultProxyUrl();
            if(!tmpUrl||!tmpUser||!tmpPass){s.textContent='请填写完整信息';return;}
            var authHeader='Basic '+btoa(tmpUser+':'+tmpPass);

            function pf(url,method,mkcol){
                return fetch(proxyUrl,{method:'POST',headers:{
                    'Content-Type':'application/json',
                    'X-WebDAV-Url':url,
                    'X-WebDAV-Auth':authHeader,
                    'X-WebDAV-Method':method,
                    'X-WebDAV-Mkcol':mkcol?'1':'0'
                }});
            }

            s.textContent='测试中...';
            var p1=pf(tmpUrl,'PROPFIND',true).then(function(r){s.textContent=s.textContent+' | 目标:'+r.status; return r;}).catch(function(e){s.textContent=s.textContent+' | 目标ERR:'+e.message;});
            var p2=pf(tmpUrl.replace(/[^\/]+$/,''),'PROPFIND',false).then(function(r){s.textContent=s.textContent+' | 根:'+r.status; return r;}).catch(function(e){s.textContent=s.textContent+' | 根ERR:'+e.message;});
            Promise.all([p1,p2]).then(function(results){
                var t=results[0], r=results[1];
                if(!t||!r)return;
                if(r.status===401){s.textContent='认证失败';return;}
                if(r.status===403){s.textContent='WebDAV被拒(403)';return;}
                if(t.ok||t.status===207){s.textContent='连接成功！';}
                else if(t.status===404){s.textContent='文件不存在，可创建';}
                else if(t.status===403){s.textContent='目标路径被拒(403)';}
                else{s.textContent='失败 HTTP '+t.status;}
            });
        };

        document.getElementById('sync-save').onclick=function(){
            var url=normalizeSyncUrl(document.getElementById('sync-url').value);
            document.getElementById('sync-url').value=url;
            var user=document.getElementById('sync-user').value.trim();
            var pass=document.getElementById('sync-pass').value.trim();
            var enabled=document.getElementById('sync-enable').checked;
            self._saveWebDAVConfig(url,user,pass,enabled,document.getElementById('sync-proxy-url').value.trim());
            if(enabled){
                self.toast('接力同步已启用，请按需手动上传或接收');
            }else{
                self.toast('接力同步已关闭');
            }
            document.getElementById('sync-modal').classList.add('hidden');
        };

        document.getElementById('sync-upload-now').onclick=function(){
            var url=normalizeSyncUrl(document.getElementById('sync-url').value);
            document.getElementById('sync-url').value=url;
            var user=document.getElementById('sync-user').value.trim();
            var pass=document.getElementById('sync-pass').value.trim();
            if(!url||!user||!pass){self.toast('请先填写同步设置');return;}
            self._saveWebDAVConfig(url,user,pass,true,document.getElementById('sync-proxy-url').value.trim());
            document.getElementById('sync-enable').checked=true;
            self.toast('正在上传本机数据...');
            self._syncToWebDAV().then(function(r){
                self.toast('本机数据已上传，换设备后点「接收同步」');
            }).catch(function(err){
                self.toast('上传失败: '+err.message);
            });
        };

        document.getElementById('sync-download-now').onclick=function(){
            var url=normalizeSyncUrl(document.getElementById('sync-url').value);
            document.getElementById('sync-url').value=url;
            var user=document.getElementById('sync-user').value.trim();
            var pass=document.getElementById('sync-pass').value.trim();
            if(!url||!user||!pass){self.toast('请先填写同步设置');return;}
            self._saveWebDAVConfig(url,user,pass,true,document.getElementById('sync-proxy-url').value.trim());
            document.getElementById('sync-enable').checked=true;
            self.toast('正在接收云端数据...');
            self._syncFromWebDAV().then(function(remote){
                if(remote){
                    self.render();
                    self.toast('已接收并合并到本机');
                }
            }).catch(function(err){
                self.toast('接收失败: '+err.message);
            });
        };

        document.getElementById('sync-cancel').onclick=function(){
            document.getElementById('sync-modal').classList.add('hidden');
        };
    },

        const filename='任务接力数据_'+new Date().toISOString().slice(0,10)+'.json';

            else self.toast('接力文件已下载');
        });
    },

    importAll:function(file){
        var self=this;
        var reader=new FileReader();
        reader.onload=function(e){
            try{
                var data=JSON.parse(e.target.result);
                if(data.tasks&&data.lists){
                    self._mergeRemoteData(data);
                }else{
                    throw new Error('invalid data');
                }
                if(data.archiveFilters)self.archiveFilters=data.archiveFilters;
                self.currentList='all';self.view='all';
                self.render();
                self.toast('接力文件已导入并合并，共 '+self.tasks.length+' 条任务');
            }catch(err){
                self.toast('文件格式错误');
            }
        };
        reader.readAsText(file);
    },

    exportMarkdown:function(){
        var self=this;
        const completed=this.tasks.filter(function(t){return t.completed&&self.archiveFilters[t.category];});
        if(completed.length===0){this.toast('没有可导出的任务');return;}
        const groups={};
        completed.forEach(function(t){
            const d=new Date(t.completedAt);
            const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
            if(!groups[key])groups[key]=[];
            groups[key].push(t);
        });
        const sortedKeys=Object.keys(groups).sort(function(a,b){return b.localeCompare(a);});
        const catLabel={zhengshi:'正事',zashi:'杂事',shenghuo:'生活'};
        const catEmoji={zhengshi:'📋',zashi:'🔧',shenghuo:'🏠'};
        let md='# 📋 任务归档\n\n';
        md+='> 导出时间：'+new Date().toLocaleString('zh-CN')+'\n\n---\n\n';
        sortedKeys.forEach(function(key){
            md+='## '+key+'\n\n';
            const tasks=groups[key];
            ['zhengshi','zashi','shenghuo'].forEach(function(cat){
                const catTasks=tasks.filter(function(t){return t.category===cat;});
                if(catTasks.length===0)return;
                md+='### '+catEmoji[cat]+' '+catLabel[cat]+'\n\n';
                catTasks.forEach(function(t){
                    md+='- [x] **'+t.name+'**\n';
                    if(t.notes)md+='  - 📝 '+t.notes.replace(/\n/g,' ')+'\n';
                });
                md+='\n';
            });
        });
        const blob=new Blob([md],{type:'text/markdown;charset=utf-8'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');a.href=url;a.download='任务归档_'+new Date().toISOString().slice(0,10)+'.md';
        a.click();URL.revokeObjectURL(url);
        this.toast('Markdown 文件已导出');
    },

    checkNotesOverflow: function() {
        document.querySelectorAll('.task-notes').forEach(noteEl => {
            if (noteEl.scrollHeight > noteEl.clientHeight + 2) {
                if (noteEl.nextElementSibling && noteEl.nextElementSibling.classList.contains('notes-toggle-btn')) return;
                
                const btn = document.createElement('div');
                btn.className = 'notes-toggle-btn';
                btn.textContent = '展开全文';
                btn.onclick = (e) => {
                    e.stopPropagation();
                    noteEl.classList.toggle('expanded');
                    btn.textContent = noteEl.classList.contains('expanded') ? '收起全文' : '展开全文';
                };
                noteEl.parentNode.insertBefore(btn, noteEl.nextSibling);
            }
        });
    },

    render:function(){
        var self=this;
        this.renderSidebar();
        const header=document.getElementById('view-header');
        const h1=header.querySelector('h1');
        const content=document.getElementById('view-content');
        const todayEl=document.getElementById('today-date');
        todayEl.textContent=new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

        const now = Date.now();
        const FIVE_DAYS = 5 * 24 * 60 * 60 * 1000;
        
        const allIncomplete = this.tasks.filter(function(t){return !t.completed;});
        
        const activeTasks = allIncomplete.filter(function(t){
            return t.inMyDay || (now - (t.activeAt || t.createdAt)) <= FIVE_DAYS;
        });
        const weatheredTasks = allIncomplete.filter(function(t){
            return !t.inMyDay && (now - (t.activeAt || t.createdAt)) > FIVE_DAYS;
        });
        
        const mydayTasks=activeTasks.filter(function(t){return t.inMyDay;});
        
        document.getElementById('badge-all').textContent=activeTasks.length;
        document.getElementById('badge-myday').textContent=mydayTasks.length;
        
        const badgeWeathered = document.getElementById('badge-weathered');
        if(badgeWeathered) badgeWeathered.textContent = weatheredTasks.length;

        switch(this.view){
            case'all':
                if(this.currentList==='all'){
                    this.renderAll(h1,content,activeTasks);
                }else{
                    var list=this.lists.find(function(l){return l.id===self.currentList;});
                    var listTasks=activeTasks.filter(function(t){return t.listId===self.currentList;});
                    this.renderListView(h1,content,listTasks,list?list.name:'清单');
                }
                break;
            case'myday':
                this.renderMyDay(h1,content,mydayTasks);
                break;
            case'weathered':
                this.renderWeathered(h1,content,weatheredTasks);
                break;
            case'archive':
                this.renderArchive(h1,content);
                break;
            case'changelog':
                this.renderChangelog(h1,content);
                break;
        }

        setTimeout(this.checkNotesOverflow.bind(this), 10);
    },
    
    renderWeathered:function(h1,content,tasks){
        var self=this;
        h1.textContent='风化';
        content.innerHTML='';
        
        const tip = document.createElement('div');
        tip.style.padding = '16px 48px 24px';
        tip.innerHTML = '<span style="font-size: 13px; color: var(--ink-mute); display: inline-block; background: var(--canvas-soft); padding: 8px 16px; border-radius: var(--radius-lg); border: 1px solid var(--hairline);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;vertical-align:-2px;margin-right:8px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>存放创建超 5 天未完成且不在「我的一天」的任务。将其加入「我的一天」可重置倒计时。</span>';
        content.appendChild(tip);

        if(tasks.length===0){
            var emptyEl=document.createElement('div');
            emptyEl.className='empty-state';
            emptyEl.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg><p>目前没有被风化的积压任务</p>';
            content.appendChild(emptyEl);
        }else{
            const list=document.createElement('div');list.className='content';
            tasks.sort(function(a,b){return (a.activeAt||a.createdAt) - (b.activeAt||b.createdAt);}).forEach(function(t){list.appendChild(self.createTaskCard(t,true));});
            content.appendChild(list);
        }
    },

    renderInput:function(content,category){
        if(!category)category='zhengshi';
        var self=this;
        var selCat=category;
        const div=document.createElement('div');div.className='input-area';
        div.innerHTML='<div class="input-row">'+
            '<input class="task-input" placeholder="添加新任务（用 # 附加备注）" maxlength="200">'+
            '<div class="cat-btns">'+
            '<button type="button" class="cat-btn zhengshi '+(category==='zhengshi'?'active':'')+'" data-cat="zhengshi">正事</button>'+
            '<button type="button" class="cat-btn zashi '+(category==='zashi'?'active':'')+'" data-cat="zashi">杂事</button>'+
            '<button type="button" class="cat-btn shenghuo '+(category==='shenghuo'?'active':'')+'" data-cat="shenghuo">生活</button>'+
            '</div></div>'+
            '<button type="button" class="add-btn">创建任务</button>';
        const input=div.querySelector('.task-input');
        const doAdd=function(){
            const raw=input.value.trim();
            if(!raw){self.toast('请输入任务名称');return;}
            const p=parseInput(raw);
            self.addTask(p.name,p.notes,selCat);
            input.value = ''; // 提交后清空输入框
        };
        div.querySelectorAll('.cat-btn').forEach(function(btn){
            btn.addEventListener('click',function(e){
                e.stopPropagation();
                div.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('active');});
                btn.classList.add('active');
                selCat=btn.dataset.cat;
                input.focus();
            });
        });
        div.querySelector('.add-btn').addEventListener('click',doAdd);
        input.addEventListener('keydown',function(e){
            if(e.key==='Enter'){e.preventDefault();doAdd();}
        });
        content.appendChild(div);
    },

    createTaskCard:function(task,showMyDay){
        if(showMyDay===undefined)showMyDay=true;
        var self=this;
        
        const wrap=document.createElement('div');
        wrap.className='task-swipe-wrap';
        
        const bg=document.createElement('div');
        bg.className='swipe-bg';
        bg.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;margin-right:8px;"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg><span style="font-size: 13px; font-weight: 500;">记录进度</span>';
        wrap.appendChild(bg);

        const card=document.createElement('div');
        // 加入分类专属的左侧色带样式 cat-xxx
        card.className='task-card cat-' + task.category + (task.completed?' completed':'');
        card.dataset.id=task.id;
        const escapedName=task.name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const completedCheck=task.completed?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg>':'';
        const timePrefix=task.completed?'<span class="task-time">'+formatDateTime(task.completedAt)+'</span>':'';
        const notesBlock=(!task.completed&&task.notes)?'<div class="task-notes-wrapper"><div class="task-notes">'+renderNotes(task.notes)+'</div></div>':'';
        const mydayBtn=showMyDay?'<button class="icon-btn'+(task.inMyDay?' myday-active':'')+'" title="'+(task.inMyDay?'从我的一天移除':'添加到我的一天')+'"><svg viewBox="0 0 24 24" fill="'+(task.inMyDay?'currentColor':'none')+'" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>':'';
        
        // 恢复文字标签，带入专属分类主题色
        const catTag = (!task.completed) ? `<span class="card-cat-tag tag-${task.category}">${CAT_LABELS[task.category] || ''}</span>` : '';

        card.innerHTML='<div class="checkbox">'+completedCheck+'</div>'+
            '<div class="task-body">'+
            (task.completed?
                (timePrefix ? '<div class="task-meta" style="margin-top:0; margin-bottom:6px;">'+timePrefix+'</div>' : '')+
                '<div class="task-name">'+escapedName+'</div>'
            :
                '<div class="task-name">'+catTag+escapedName+'</div>'+notesBlock)
            +'</div>'+
            '<div class="task-actions">'+mydayBtn+
            '<button class="icon-btn danger" title="删除"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>'+
            '</div>';

        card.querySelector('.checkbox').addEventListener('click',function(e){e.stopPropagation();self.toggleComplete(task.id);});
        if(showMyDay){
            var mydayBtnEl=card.querySelector('.icon-btn:not(.danger)');
            if(mydayBtnEl)mydayBtnEl.addEventListener('click',function(e){e.stopPropagation();self.toggleMyDay(task.id);});
        }
        card.querySelector('.icon-btn.danger').addEventListener('click',function(e){e.stopPropagation();self.deleteTask(task.id);});
        
        wrap.appendChild(card);
        return wrap;
    },

    renderAll:function(h1,content,tasks){
        var self=this;
        h1.textContent='所有任务';
        content.innerHTML='';
        this.renderInput(content);
        if(tasks.length===0){
            var emptyEl=document.createElement('div');
            emptyEl.className='empty-state';
            emptyEl.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg><p>暂无任务，开启高效的一天</p>';
            content.appendChild(emptyEl);
        }else{
            const list=document.createElement('div');list.className='content';
            tasks.forEach(function(t){list.appendChild(self.createTaskCard(t,true));});
            content.appendChild(list);
        }
    },

    renderListView:function(h1,content,tasks,listName){
        var self=this;
        h1.textContent=listName;
        content.innerHTML='';
        this.renderInput(content);
        if(tasks.length===0){
            var emptyEl=document.createElement('div');
            emptyEl.className='empty-state';
            emptyEl.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg><p>该清单中暂无任务</p>';
            content.appendChild(emptyEl);
        }else{
            const list=document.createElement('div');list.className='content';
            tasks.forEach(function(t){list.appendChild(self.createTaskCard(t,true));});
            content.appendChild(list);
        }
    },

    renderMyDay:function(h1,content,tasks){
        var self=this;
        h1.textContent='我的一天';
        content.innerHTML='';
        this.renderInput(content);
        if(tasks.length===0){
            var emptyEl=document.createElement('div');
            emptyEl.className='empty-state';
            emptyEl.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><p>今天还没有聚焦任务，双击任务进行添加</p>';
            content.appendChild(emptyEl);
        }else{
            const list=document.createElement('div');list.className='content';
            tasks.forEach(function(t){list.appendChild(self.createTaskCard(t,true));});
            content.appendChild(list);
        }
    },

    renderArchive:function(h1,content){
        var self=this;
        h1.textContent='归档';
        content.innerHTML='';
        const toolbar=document.createElement('div');toolbar.className='archive-toolbar';
        toolbar.innerHTML='<div class="archive-filters">'+
            '<span class="filter-label">筛选：</span>'+
            '<button class="filter-chip'+(this.archiveFilters.zhengshi?' active':'')+'" data-filter="zhengshi">正事</button>'+
            '<button class="filter-chip'+(this.archiveFilters.zashi?' active':'')+'" data-filter="zashi">杂事</button>'+
            '<button class="filter-chip'+(this.archiveFilters.shenghuo?' active':'')+'" data-filter="shenghuo">生活</button>'+
            '</div>'+
            '<button class="export-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>导出 Markdown</button>';
        toolbar.querySelectorAll('.filter-chip').forEach(function(chip){
            chip.addEventListener('click',function(){self.setArchiveFilter(chip.dataset.filter);});
        });
        toolbar.querySelector('.export-btn').addEventListener('click',function(){self.exportMarkdown();});
        content.appendChild(toolbar);

        const completed=this.tasks.filter(function(t){return t.completed&&self.archiveFilters[t.category];});
        if(completed.length===0){
            var emptyEl=document.createElement('div');
            emptyEl.className='empty-state';
            emptyEl.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><p>暂无归档任务</p>';
            content.appendChild(emptyEl);
            return;
        }
        const groups={};
        completed.forEach(function(t){
            const d=new Date(t.completedAt);
            const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
            if(!groups[key])groups[key]=[];
            groups[key].push(t);
        });
        
        const sortedKeys=Object.keys(groups).sort(function(a,b){return b.localeCompare(a);});
        const timeline=document.createElement('div');timeline.className='timeline';
        
        const todayDate = new Date();
        const todayKey = todayDate.getFullYear() + '-' + String(todayDate.getMonth()+1).padStart(2,'0') + '-' + String(todayDate.getDate()).padStart(2,'0');

        sortedKeys.forEach(function(key){
            const isToday = (key === todayKey);
            const dayDiv=document.createElement('div');dayDiv.className='timeline-day';
            
            const arrowSvg = `<svg class="archive-arrow ${isToday ? 'open' : ''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>`;
            
            dayDiv.innerHTML='<div class="timeline-header" style="cursor:pointer" title="点击展开/折叠">' + 
                arrowSvg + 
                '<span class="timeline-date">'+formatDate(new Date(key+'T00:00:00').getTime())+'</span>'+
                '<span class="timeline-count">'+groups[key].length+' 项</span>'+
                '</div>';
                
            const tasksDiv=document.createElement('div');tasksDiv.className='timeline-tasks';
            
            if (!isToday) {
                tasksDiv.style.display = 'none';
            }
            
            groups[key].sort(function(a,b){return b.completedAt-a.completedAt;}).forEach(function(t){tasksDiv.appendChild(self.createTaskCard(t,false));});
            dayDiv.appendChild(tasksDiv);
            
            dayDiv.querySelector('.timeline-header').addEventListener('click', function() {
                const isHidden = tasksDiv.style.display === 'none';
                tasksDiv.style.display = isHidden ? 'flex' : 'none';
                const arrow = this.querySelector('.archive-arrow');
                if (isHidden) arrow.classList.add('open');
                else arrow.classList.remove('open');
            });
            
            timeline.appendChild(dayDiv);
        });
        content.appendChild(timeline);
    },

};

document.addEventListener('DOMContentLoaded',function(){
    App.init();
